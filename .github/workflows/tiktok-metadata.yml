name: TikTok Metadata Archiver

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  collect-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Handle Cookies (Optional)
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: |
          if [ -n "$TIKTOK_COOKIES" ]; then
            echo "$TIKTOK_COOKIES" > cookies.txt
            echo "Cookies configured successfully."
          else
            echo "No TIKTOK_COOKIES secret found. Proceeding anonymously."
          fi

      - name: Prepare output directories
        run: |
          mkdir -p data/users

      - name: Run TikTok Collector Script
        run: python scripts/collect_tiktok_metadata.py

      - name: Clean up sensitive files
        run: rm -f cookies.txt

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Defensive check: Ensure files actually exist before adding
          if [ -z "$(find data -type f 2>/dev/null)" ]; then
            echo "No data files generated. Nothing to commit."
            exit 0
          fi

          git add data/

          if git diff --staged --quiet; then
            echo "No changes in data to commit."
          else
            git commit -m "chore: auto-update TikTok metadata [skip ci]"
            git push
          fi
